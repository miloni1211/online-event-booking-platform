spring.application.name=paymentservice
# WHY: Payment service runs on 8085
# 8084 is now notification service
server.port=8085

# MongoDB
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=eventbooking_db
spring.data.mongodb.auto-index-creation=false

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

# WHY: Stripe secret key for API calls
# Never expose this publicly
# Use environment variable in production
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_default}

# WHY: Webhook secret to verify Stripe events
# Get this from Stripe Dashboard ? Webhooks
stripe.webhook.secret=whsec_paste_your_webhook_secret_here

logging.level.com.eventbooking=DEBUG

