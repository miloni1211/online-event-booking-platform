spring.application.name=ai-service
server.port=8086
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=eventbooking_db
spring.data.mongodb.auto-index-creation=false

spring.ai.openai.api-key=${GROQ_API_KEY}

spring.ai.openai.base-url=https://api.groq.com/openai

# WHY: Using LLaMA 3 model on Groq
# Fast, free, very capable
# Good for recommendations and text generation
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# WHY: Max tokens in AI response, 1000 tokens = roughly 750 words
spring.ai.openai.chat.options.max-tokens=1000

spring.ai.openai.chat.options.temperature=0.7

logging.level.com.eventbooking=DEBUG